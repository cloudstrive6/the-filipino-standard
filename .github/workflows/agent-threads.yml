name: TFS Agent - Threads

# Autonomous research+write+publish for Threads, hourly during PH waking hours.
# 6am-11pm PHT = UTC 22,23,0..15 (PHT = UTC+8). ~18 runs/day.
# Runs in DRY RUN until the repo variable TFS_LIVE is set to "true".

on:
  schedule:
    - cron: "0 22,23,0-15 * * *"
  workflow_dispatch: {}

concurrency:
  group: tfs-agent          # shared with FB/IG so runs serialize (clean log commits)
  cancel-in-progress: false

permissions:
  contents: write           # to commit drafts.md + posted_log.jsonl back

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @anthropic-ai/claude-code
      - run: touch .env logs/drafts.md logs/posted_log.jsonl

      # NOTE: verify/tune the `claude` invocation on the FIRST dry-run -
      # headless flags (--allowedTools / --dangerously-skip-permissions /
      # --max-turns) and OAuth env var name can change between CLI versions.
      - name: Run post agent (DRY RUN unless TFS_LIVE=true)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
          POSTFORME_PROJECT_ID: ${{ secrets.POSTFORME_PROJECT_ID }}
          POSTFORME_FB_PAGE_ID: ${{ secrets.POSTFORME_FB_PAGE_ID }}
          POSTFORME_IG_ACCOUNT_ID: ${{ secrets.POSTFORME_IG_ACCOUNT_ID }}
          POSTFORME_THREADS_ACCOUNT_ID: ${{ secrets.POSTFORME_THREADS_ACCOUNT_ID }}
          TFS_LIVE: ${{ vars.TFS_LIVE }}
        run: |
          claude -p "Read agent/post_agent.md and perform exactly ONE run for PLATFORM=threads. We are in dry-run rollout unless the TFS_LIVE env var is exactly 'true'." \
            --allowedTools "Bash,WebSearch,Read,Write,Edit,Glob,Grep" \
            --dangerously-skip-permissions \
            --max-turns 40

      - name: Persist agent memory (drafts + posted log)
        if: always()
        run: |
          git config user.name "TFS Agent"
          git config user.email "tfs-bot@users.noreply.github.com"
          git add logs/drafts.md logs/posted_log.jsonl || true
          git diff --cached --quiet || git commit -m "agent(threads): memory $(date -u +%FT%TZ)"
          git push || true

      - name: Upload drafts for review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drafts-threads-${{ github.run_id }}
          path: logs/drafts.md
          if-no-files-found: ignore
